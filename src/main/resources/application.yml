spring:
  application.name: keycloak-user-storage	
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect 
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  main:
    allow-bean-definition-overriding: true

server:
  port: 8081

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

management:
  metrics.tags.application: ${spring.application.name}
  endpoints:
    prometheus:  
     enabled: true 	
    web:
      exposure:
        include: "*"
    health:
      show-details: ALWAY